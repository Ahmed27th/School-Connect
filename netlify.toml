[build]
  command = "npx next build"
  publish = ".next"
  environment = { NEXT_DISABLE_TURBOPACK = "1" }

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"
